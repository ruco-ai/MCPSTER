  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0f1c9ac9-7b8d-4b6c-9ee5-c2bcac2fe891\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --bg-base:     oklch(0.08 0.012 275);\n    --bg-surface:  oklch(0.11 0.012 275);\n    --bg-elevated: oklch(0.14 0.012 275);\n    --bg-border:   oklch(0.20 0.012 275);\n    --fg-primary:   oklch(0.97 0.005 275);\n    --fg-secondary: oklch(0.60 0.015 275);\n    --fg-muted:     oklch(0.40 0.010 275);\n    --violet:       oklch(0.65 0.24 283);\n    --violet-dim:   oklch(0.55 0.20 283);\n    --violet-glow:  oklch(0.65 0.24 283 / 0.15);\n    --violet-bg:    oklch(0.65 0.24 283 / 0.08);\n    --amber:        oklch(0.76 0.18 62);\n    --amber-bg:     oklch(0.76 0.18 62 / 0.10);\n    --green:        oklch(0.72 0.18 158);\n    --font-display: 'Space Grotesk', sans-serif;\n    --font-body:    'DM Sans', sans-serif;\n    --font-mono:    'JetBrains Mono', monospace;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    background: var(--bg-base);\n    color: var(--fg-primary);\n    font-family: var(--font-body);\n    font-size: 16px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n\n  /* ── NAV ── */\n  nav {\n    position: fixed;\n    top: 0; left: 0; right: 0;\n    z-index: 100;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 0 48px;\n    height: 60px;\n    background: oklch(0.08 0.012 275 / 0.85);\n    backdrop-filter: blur(16px);\n    border-bottom: 1px solid var(--bg-border);\n  }\n  .nav-logo {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    text-decoration: none;\n  }\n  .nav-wordmark {\n    font-family: var(--font-display);\n    font-weight: 700;\n    font-size: 17px;\n    letter-spacing: -0.02em;\n  }\n  .nav-wordmark .mcp { color: var(--fg-primary); }\n  .nav-wordmark .ster { color: var(--violet); }\n\n  .nav-links {\n    display: flex;\n    align-items: center;\n    gap: 32px;\n    list-style: none;\n  }\n  .nav-links a {\n    font-family: var(--font-body);\n    font-size: 14px;\n    font-weight: 500;\n    color: var(--fg-secondary);\n    text-decoration: none;\n    transition: color 0.15s;\n  }\n  .nav-links a:hover { color: var(--fg-primary); }\n\n  .nav-right {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .btn {\n    font-family: var(--font-display);\n    font-weight: 600;\n    font-size: 14px;\n    border-radius: 7px;\n    border: none;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 7px;\n    letter-spacing: -0.01em;\n    transition: opacity 0.15s, transform 0.12s, box-shadow 0.15s;\n    text-decoration: none;\n    white-space: nowrap;\n  }\n  .btn:hover { opacity: 0.88; transform: translateY(-1px); }\n  .btn-ghost {\n    background: transparent;\n    color: var(--fg-secondary);\n    padding: 7px 14px;\n    border: 1px solid var(--bg-border);\n  }\n  .btn-ghost:hover { color: var(--fg-primary); border-color: var(--bg-elevated); }\n  .btn-primary {\n    background: var(--violet);\n    color: white;\n    padding: 8px 18px;\n    box-shadow: 0 0 20px oklch(0.65 0.24 283 / 0.25);\n  }\n  .btn-primary:hover { box-shadow: 0 0 28px oklch(0.65 0.24 283 / 0.4); }\n\n  /* ── HERO ── */\n  .hero {\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    text-align: center;\n    padding: 120px 40px 80px;\n    position: relative;\n    overflow: hidden;\n  }\n\n  /* Radial glow behind hero */\n  .hero::before {\n    content: '';\n    position: absolute;\n    top: -200px; left: 50%;\n    transform: translateX(-50%);\n    width: 900px; height: 600px;\n    background: radial-gradient(ellipse at center, oklch(0.65 0.24 283 / 0.12) 0%, transparent 70%);\n    pointer-events: none;\n  }\n  /* Grid lines */\n  .hero::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(var(--bg-border) 1px, transparent 1px),\n      linear-gradient(90deg, var(--bg-border) 1px, transparent 1px);\n    background-size: 64px 64px;\n    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 80%);\n    opacity: 0.4;\n    pointer-events: none;\n  }\n\n  .hero-badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: var(--violet-bg);\n    border: 1px solid oklch(0.65 0.24 283 / 0.25);\n    border-radius: 99px;\n    padding: 5px 14px;\n    font-family: var(--font-mono);\n    font-size: 12px;\n    color: var(--violet);\n    margin-bottom: 32px;\n    position: relative;\n    z-index: 1;\n  }\n  .hero-badge-dot {\n    width: 6px; height: 6px;\n    background: var(--violet);\n    border-radius: 50%;\n  }\n\n  .hero-title {\n    font-family: var(--font-display);\n    font-size: clamp(48px, 8vw, 88px);\n    font-weight: 700;\n    letter-spacing: -0.04em;\n    line-height: 1;\n    position: relative;\n    z-index: 1;\n    margin-bottom: 24px;\n  }\n  .hero-title .accent { color: var(--violet); }\n\n  .hero-sub {\n    font-family: var(--font-body);\n    font-size: clamp(16px, 2vw, 20px);\n    color: var(--fg-secondary);\n    max-width: 560px;\n    line-height: 1.55;\n    position: relative;\n    z-index: 1;\n    margin-bottom: 40px;\n    text-wrap: pretty;\n  }\n\n  .hero-actions {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    position: relative;\n    z-index: 1;\n    margin-bottom: 64px;\n    flex-wrap: wrap;\n    justify-content: center;\n  }\n  .btn-hero {\n    padding: 12px 28px;\n    font-size: 15px;\n    border-radius: 9px;\n  }\n\n  .install-pill {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    background: var(--bg-surface);\n    border: 1px solid var(--bg-border);\n    border-radius: 9px;\n    padding: 10px 18px;\n    font-family: var(--font-mono);\n    font-size: 14px;\n    color: var(--fg-secondary);\n    position: relative;\n    z-index: 1;\n    cursor: text;\n    user-select: all;\n  }\n  .install-pill .npm { color: var(--amber); }\n  .install-pill .pkg { color: var(--violet); }\n\n  /* Terminal hero visual */\n  .hero-terminal {\n    width: 100%;\n    max-width: 760px;\n    position: relative;\n    z-index: 1;\n  }\n  .terminal-window {\n    background: oklch(0.06 0.010 275);\n    border: 1px solid var(--bg-border);\n    border-radius: 12px;\n    overflow: hidden;\n    text-align: left;\n    box-shadow: 0 40px 80px oklch(0 0 0 / 0.5), 0 0 0 1px oklch(0.65 0.24 283 / 0.08);\n  }\n  .terminal-header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 12px 18px;\n    background: var(--bg-surface);\n    border-bottom: 1px solid var(--bg-border);\n  }\n  .terminal-dots { display: flex; gap: 6px; }\n  .dot { width: 11px; height: 11px; border-radius: 50%; }\n  .dot.r { background: oklch(0.60 0.18 25 / 0.8); }\n  .dot.y { background: oklch(0.72 0.16 75 / 0.8); }\n  .dot.g { background: oklch(0.66 0.17 145 / 0.8); }\n  .terminal-title {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    color: var(--fg-muted);\n  }\n  .terminal-tag {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--fg-muted);\n    background: var(--bg-elevated);\n    padding: 2px 8px;\n    border-radius: 4px;\n  }\n  pre {\n    padding: 28px;\n    overflow-x: auto;\n    font-family: var(--font-mono);\n    font-size: 13.5px;\n    line-height: 1.8;\n    tab-size: 2;\n  }\n  .k  { color: var(--violet); }\n  .fn { color: oklch(0.75 0.16 220); }\n  .s  { color: var(--amber); }\n  .c  { color: var(--fg-muted); font-style: italic; }\n  .p  { color: var(--fg-secondary); }\n  .t  { color: var(--green); }\n  .n  { color: var(--fg-primary); }\n\n  /* ── STATS ── */\n  .stats-strip {\n    border-top: 1px solid var(--bg-border);\n    border-bottom: 1px solid var(--bg-border);\n    display: flex;\n    justify-content: center;\n    flex-wrap: wrap;\n  }\n  .stat {\n    flex: 1;\n    min-width: 160px;\n    padding: 32px 40px;\n    display: flex;\n    flex-direction: column;\n    gap: 4px;\n    border-right: 1px solid var(--bg-border);\n    text-align: center;\n  }\n  .stat:last-child { border-right: none; }\n  .stat-val {\n    font-family: var(--font-display);\n    font-size: 32px;\n    font-weight: 700;\n    letter-spacing: -0.03em;\n    color: var(--fg-primary);\n  }\n  .stat-val .acc { color: var(--violet); }\n  .stat-label {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--fg-muted);\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n\n  /* ── SECTIONS ── */\n  .section {\n    padding: 100px 48px;\n    max-width: 1120px;\n    margin: 0 auto;\n  }\n  .section-label {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--violet);\n    margin-bottom: 12px;\n  }\n  .section-title {\n    font-family: var(--font-display);\n    font-size: clamp(32px, 4vw, 48px);\n    font-weight: 700;\n    letter-spacing: -0.03em;\n    line-height: 1.05;\n    margin-bottom: 16px;\n  }\n  .section-desc {\n    font-size: 17px;\n    color: var(--fg-secondary);\n    max-width: 520px;\n    line-height: 1.55;\n    text-wrap: pretty;\n  }\n\n  /* ── FEATURES ── */\n  .features-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 2px;\n    margin-top: 56px;\n  }\n  .feature-card {\n    background: var(--bg-surface);\n    padding: 32px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    transition: background 0.2s;\n  }\n  .feature-card:hover { background: var(--bg-elevated); }\n  .feature-icon {\n    width: 40px; height: 40px;\n    background: var(--violet-bg);\n    border: 1px solid oklch(0.65 0.24 283 / 0.2);\n    border-radius: 10px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: var(--violet);\n    flex-shrink: 0;\n  }\n  .feature-title {\n    font-family: var(--font-display);\n    font-size: 17px;\n    font-weight: 600;\n    letter-spacing: -0.01em;\n    color: var(--fg-primary);\n  }\n  .feature-desc {\n    font-size: 14px;\n    color: var(--fg-secondary);\n    line-height: 1.55;\n    text-wrap: pretty;\n  }\n  .feature-tag {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--violet);\n    background: var(--violet-bg);\n    border: 1px solid oklch(0.65 0.24 283 / 0.2);\n    padding: 2px 8px;\n    border-radius: 4px;\n    align-self: flex-start;\n    margin-top: auto;\n  }\n\n  /* ── HOW IT WORKS — Deploy stages ── */\n  .stages {\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n    margin-top: 56px;\n  }\n  .stage {\n    display: grid;\n    grid-template-columns: 64px 1fr 1fr;\n    gap: 0;\n    background: var(--bg-surface);\n    border: 1px solid transparent;\n    transition: border-color 0.2s;\n    align-items: stretch;\n  }\n  .stage:hover { border-color: var(--bg-border); }\n  .stage-num {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: var(--font-mono);\n    font-size: 13px;\n    font-weight: 600;\n    color: var(--violet);\n    border-right: 1px solid var(--bg-border);\n    padding: 28px 0;\n  }\n  .stage-info {\n    padding: 28px 32px;\n    border-right: 1px solid var(--bg-border);\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n    justify-content: center;\n  }\n  .stage-title {\n    font-family: var(--font-display);\n    font-size: 17px;\n    font-weight: 600;\n    letter-spacing: -0.01em;\n  }\n  .stage-desc {\n    font-size: 14px;\n    color: var(--fg-secondary);\n    line-height: 1.5;\n  }\n  .stage-code {\n    padding: 20px 28px;\n    font-family: var(--font-mono);\n    font-size: 12.5px;\n    color: var(--fg-secondary);\n    display: flex;\n    align-items: center;\n    line-height: 1.6;\n    overflow-x: auto;\n    white-space: pre;\n  }\n\n  /* ── DEPLOY TARGETS ── */\n  .targets-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 2px;\n    margin-top: 56px;\n  }\n  .target-card {\n    background: var(--bg-surface);\n    padding: 32px;\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n    transition: background 0.15s;\n    position: relative;\n    overflow: hidden;\n  }\n  .target-card:hover { background: var(--bg-elevated); }\n  .target-card::before {\n    content: '';\n    position: absolute;\n    top: 0; left: 0; right: 0;\n    height: 2px;\n    background: var(--violet);\n    opacity: 0;\n    transition: opacity 0.2s;\n  }\n  .target-card:hover::before { opacity: 1; }\n  .target-logo {\n    font-family: var(--font-display);\n    font-size: 20px;\n    font-weight: 700;\n    color: var(--fg-primary);\n    letter-spacing: -0.02em;\n  }\n  .target-cmd {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    color: var(--green);\n    background: oklch(0.06 0.010 275);\n    border: 1px solid var(--bg-border);\n    border-radius: 6px;\n    padding: 8px 12px;\n  }\n  .target-desc {\n    font-size: 13px;\n    color: var(--fg-muted);\n    line-height: 1.5;\n  }\n\n  /* ── BIG CODE EXAMPLE ── */\n  .code-section {\n    background: var(--bg-surface);\n    border-top: 1px solid var(--bg-border);\n    border-bottom: 1px solid var(--bg-border);\n    padding: 80px 48px;\n  }\n  .code-section-inner {\n    max-width: 1120px;\n    margin: 0 auto;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 64p =\"s\">'summarize'<\u002Fspan><span class=\"p\">,<\u002Fspan>       <span class=\"n\">handler<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"k\">async<\u002Fspan> <span class=\"p\">(<\u002Fspan><span class=\"n\">args<\u002Fspan><span class=\"p\">)<\u002Fspan> <span class=\"p\">=&gt;<\u002Fspan> <span class=\"p\">{<\u002Fspan> <span class=\"c\">/* … */<\u002Fspan> <span class=\"p\">}<\u002Fspan> <span class=\"p\">})<\u002Fspan>\n  <span class=\"p\">.<\u002Fspan><span class=\"fn\">start<\u002Fspan><span class=\"p\">()<\u002Fspan>  <span class=\"c\">// stdio by default — switch to 'http' with one config field<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STATS -->\n<div class=\"stats-strip\">\n  <div class=\"stat\">\n    <div class=\"stat-val\"><span class=\"acc\">3<\u002Fspan> transports<\u002Fdiv>\n    <div class=\"stat-label\">stdio · http · oauth<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"stat-val\"><span class=\"acc\">1<\u002Fspan> command<\u002Fdiv>\n    <div class=\"stat-label\">deploy anywhere<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"stat-val\"><span class=\"acc\">0<\u002Fspan> rewrites<\u002Fdiv>\n    <div class=\"stat-label\">local → hosted<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"stat-val\">MIT<\u002Fdiv>\n    <div class=\"stat-label\">license<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FEATURES -->\n<div id=\"features\">\n  <div class=\"section\">\n    <div class=\"section-label\">Features<\u002Fdiv>\n    <h2 class=\"section-title\">Everything you need.<br>Nothing you don't.<\u002Fh2>\n    <p class=\"section-desc\">mcpster wraps @modelcontextprotocol/sdk behind a clean surface. Register a tool in three lines. Deploy to production in one command.<\u002Fp>\n\n    <div class=\"features-grid\">\n      <div class=\"feature-card\">\n        <div class=\"feature-icon\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 18 22 12 16 6\"><\u002Fpolyline><polyline points=\"8 6 2 12 8 18\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-title\">Fluent chainable API<\u002Fdiv>\n        <div class=\"feature-desc\">createServer().defineTool().defineResource().definePrompt().start() — readable from top to bottom, no config objects scattered across files.<\u002Fdiv>\n        <div class=\"feature-tag\">DX-first<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"feature-card\">\n        <div class=\"feature-icon\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-title\">Zod-first validation<\u002Fdiv>\n        <div class=\"feature-desc\">Pass a Zod schema and your handler gets fully-typed, pre-validated arguments. Wrong input never reaches your code.<\u002Fdiv>\n        <div class=\"feature-tag\">type-safe<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"feature-card\">\n        <div class=\"feature-icon\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"17 1 21 5 17 9\"><\u002Fpolyline><path d=\"M3 11V9a4 4 0 0 1 4-4h14\"><\u002Fpath><polyline points=\"7 23 3 19 7 15\"><\u002Fpolyline><path d=\"M21 13v2a4 4 0 0 1-4 4H3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-title\">Two transports, one API<\u002Fdiv>\n        <div class=\"feature-desc\">Switch between stdio and Streamable HTTP by changing a single config field. Your handlers are identical across both.<\u002Fdiv>\n        <div class=\"feature-tag\">stdio · http<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"feature-card\">\n        <div class=\"feature-icon\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-title\">OAuth 2.1 built in<\u002Fdiv>\n        <div class=\"feature-desc\">Enable PKCE-protected endpoints with auth: true. Dynamic client registration, token issuance, and bearer verification — all handled.<\u002Fdiv>\n        <div class=\"feature-tag\">OAuth 2.1 · PKCE<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"feature-card\">\n        <div class=\"feature-icon\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 16 12 12 8 16\"><\u002Fpolyline><line x1=\"12\" y1=\"12\" x2=\"12\" y2=\"21\"><\u002Fline><path d=\"M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-title\">One-command deploy<\u002Fdiv>\n        <div class=\"feature-desc\">npx mcpster-deploy --target railway pushes your server to Railway, Fly.io, or Cloudflare Workers. Dry-run to preview the manifest first.<\u002Fdiv>\n        <div class=\"feature-tag\">railway · fly · cf<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"feature-card\">\n        <div class=\"feature-icon\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z\"><\u002Fpath><polyline points=\"13 2 13 9 20 9\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"feature-title\">URI template resources<\u002Fdiv>\n        <div class=\"feature-desc\">Define resources with templates like templates://{name} and mcpster extracts the parameters and passes them to your resolver.<\u002Fdiv>\n        <div class=\"feature-tag\">RFC 6570<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- QUICK START -->\n<div id=\"quickstart\" class=\"code-section\">\n  <div class=\"code-section-inner\">\n    <div>\n      <div class=\"section-label\">Quick start<\u002Fdiv>\n      <h2 class=\"section-title\" style=\"font-size:36px;\">From zero to MCP server in minutes.<\u002Fh2>\n      <p class=\"section-desc\" style=\"font-size:15px;margin-bottom:32px;\">Install, define, start. Add a resource or prompt when you need one. Switch to HTTP when you're ready to go remote.<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;\">\n          <div style=\"width:28px;height:28px;border-radius:50%;background:var(--violet-bg);border:1px solid oklch(0.65 0.24 283 / 0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-mono);font-size:11px;color:var(--violet);font-weight:600;\">1<\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--font-display);font-size:15px;font-weight:600;margin-bottom:4px;\">Install<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:12px;color:var(--fg-secondary);\">npm install mcpster zod<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;\">\n          <div style=\"width:28px;height:28px;border-radius:50%;background:var(--violet-bg);border:1px solid oklch(0.65 0.24 283 / 0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-mono);font-size:11px;color:var(--violet);font-weight:600;\">2<\u002Fdiv>\n "tab-oauth\" style=\"display:none\">\n<pre><span class=\"fn\">createServer<\u002Fspan><span class=\"p\">({<\u002Fspan>\n  <span class=\"n\">name<\u002Fspan><span class=\"p\">:<\u002Fspan>      <span class=\"s\">'my-server'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n  <span class=\"n\">version<\u002Fspan><span class=\"p\">:<\u002Fspan>   <span class=\"s\">'1.0.0'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n  <span class=\"n\">transport<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"s\">'http'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n  <span class=\"n\">http<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"p\">{<\u002Fspan>\n    <span class=\"n\">port<\u002Fspan><span class=\"p\">:<\u002Fspan>        <span class=\"t\">3000<\u002Fspan><span class=\"p\">,<\u002Fspan>\n    <span class=\"n\">path<\u002Fspan><span class=\"p\">:<\u002Fspan>        <span class=\"s\">'/mcp'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n    <span class=\"n\">auth<\u002Fspan><span class=\"p\">:<\u002Fspan>        <span class=\"k\">true<\u002Fspan><span class=\"p\">,<\u002Fspan>\n    <span class=\"n\">baseUrl<\u002Fspan><span class=\"p\">:<\u002Fspan>     <span class=\"s\">'https://api.example.com'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n    <span class=\"n\">clientsFile<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"s\">'/data/clients.json'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n  <span class=\"p\">},<\u002Fspan>\n<span class=\"p\">})<\u002Fspan>\n  <span class=\"p\">.<\u002Fspan><span class=\"fn\">defineTool<\u002Fspan><span class=\"p\">({<\u002Fspan> <span class=\"c\">/* … */<\u002Fspan> <span class=\"p\">})<\u002Fspan>\n  <span class=\"p\">.<\u002Fspan><span class=\"fn\">start<\u002Fspan><span class=\"p\">()<\u002Fspan>\n\n<span class=\"c\">// Handles /register /authorize<\u002Fspan>\n<span class=\"c\">// /token + bearer verification<\u002Fspan><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DEPLOY STAGES -->\n<div id=\"deploy\">\n  <div class=\"section\">\n    <div class=\"section-label\">Progressive deployment<\u002Fdiv>\n    <h2 class=\"section-title\">Local → Hosted.<br>Zero rewrites.<\u002Fh2>\n    <p class=\"section-desc\">The same server code runs through every stage. Switch transports, flip a flag, run one command.<\u002Fp>\n\n    <div class=\"stages\">\n      <div class=\"stage\">\n        <div class=\"stage-num\">01<\u002Fdiv>\n        <div class=\"stage-info\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px;\">\n            <div class=\"stage-title\">Local stdio<\u002Fdiv>\n            <span class=\"badge badge-green\" style=\"font-size:10px;\">no infra<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stage-desc\">Run in-process. Register directly with Claude Code or any MCP-compatible client. No ports, no auth.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stage-code\"><span class=\"fn\">createServer<\u002Fspan><span class=\"p\">({<\u002Fspan> <span class=\"n\">name<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"s\">'srv'<\u002Fspan> <span class=\"p\">}).<\u002Fspan><span class=\"fn\">start<\u002Fspan><span class=\"p\">()<\u002Fspan>\n<span class=\"c\">// claude mcp add srv -- npx mcpster start<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"stage\">\n        <div class=\"stage-num\">02<\u002Fdiv>\n        <div class=\"stage-info\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px;\">\n            <div class=\"stage-title\">Local HTTP<\u002Fdiv>\n            <span class=\"badge badge-violet\" style=\"font-size:10px;\">same code<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stage-desc\">Expose over Streamable HTTP. Share with teammates on the same network. Still no deploy needed.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stage-code\"><span class=\"fn\">createServer<\u002Fspan><span class=\"p\">({<\u002Fspan> <span class=\"n\">transport<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"s\">'http'<\u002Fspan><span class=\"p\">,<\u002Fspan>\n  <span class=\"n\">http<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"p\">{<\u002Fspan> <span class=\"n\">port<\u002Fspan><span class=\"p\">:<\u002Fspan> <span class=\"t\">3000<\u002Fspan> <span class=\"p\">}<\u002Fspan> <span class=\"p\">}).<\u002Fspan><span class=\"fn\">start<\u002Fspan><span class=\"p\">()<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"stage\">\n        <div class=\"stage-num\">03<\u002Fdiv>\n        <div class=\"stage-info\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px;\">\n            <div class=\"stage-title\">Hosted<\u002Fdiv>\n            <span class=\"badge badge-amber\" style=\"font-size:10px;\">one command<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stage-desc\">Push to Railway, Fly.io, or Cloudflare Workers. Connect Claude Code to the public endpoint.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stage-code\"><span class=\"t\">npx<\u002Fspan> <span class=\"fn\">mcpster-deploy<\u002Fspan> <span class=\"n\">--target<\u002Fspan> <span class=\"s\">railway<\u002Fspan>\n<span class=\"c\">// → https://srv.up.railway.app/mcp<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Deploy targets -->\n    <div class=\"targets-grid\" style=\"margin-top:32px;\">\n      <div class=\"target-card\">\n        <div class=\"target-logo\">Railway<\u002Fdiv>\n        <div class=\"target-cmd\">npx mcpster-deploy --target railway<\u002Fdiv>\n        <div class=\"target-desc\">Zero-config. Generates a Railway manifest and deploys automatically.<\u002Fdiv>\n        <div style=\"margin-top:auto;\"><span class=\"badge badge-green\">ready<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"target-card\">\n        <div class=\"target-logo\">Fly.io<\u002Fdiv>\n        <div class=\"target-cmd\">npx mcpster-deploy --target fly --region lhr<\u002Fdiv>\n        <div class=\"target-desc\">Generates a fly.toml + Dockerfile. Region-aware deployment.<\u002Fdiv>\n        <div style=\"margin-top:auto;\"><span class=\"badge badge-green\">ready<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"target-card\">\n        <div class=\"target-logo\">Cloudflare<\u002Fdiv>\n        <div class=\"target-cmd\">npx mcpster-deploy --target cloudflare<\u002Fdiv>\n        <div class=\"target-desc\">Worker shim + wrangler deploy. Edge-native, globally distributed.<\u002Fdiv>\n        <div style=\"margin-top:auto;\"><span class=\"badge badge-green\">ready<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CTA -->\n<div class=\"cta-section\">\n  <h2 class=\"cta-title\">Ready to build your<br>first MCP server?<\u002Fh2>\n  <p class=\"cta-sub\">Three lines to define a tool. One command to go live.<\u002Fp>\n  <div class=\"cta-actions\">\n    <a class=\"btn btn-primary\" href=\"https://github.com/ruco-ai/MCPSTER\" target=\"_blank\" style=\"padding:14px 32px;font-size:16px;border-radius:10px;box-shadow:0 0 32px oklch(0.65 0.24 283 / 0.3);\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.69c-2.78.6-3.37-1.34-3.37-1.34-.45-1.15-1.11-1.46-1.11-1.46-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.26-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85.004 1.7.115 2.5.337 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.38.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.94.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z\"><\u002Fpath><\u002Fsvg>\n      View on GitHub\n    <\u002Fa>\n    <div class=\"install-pill\" style=\"font-size:15px;\">\n      <span class=\"npm\">npm<\u002Fspan> install <span class=\"pkg\">mcpster<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer>\n  <a class=\"footer-logo\" href=\"#\">\n    <svg width=\"22\" height=\"22\" viewBox=\"0 0 32 32\" fill=\"none\">\n      <rect width=\"32\" height=\"32\" rx=\"8\" fill=\"oklch(0.65 0.24 283)\"><\u002Frect>\n      <circle cx=\"9\" cy=\"16\" r=\"3\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"16\" cy=\"9\" r=\"3\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"23\" cy=\"16\" r=\"3\" fill=\"white\"><\u002Fcircle>\n      <line x1=\"9\" y1=\"16\" x2=\"16\" y2=\"9\" stroke=\"white\" stroke-width=\"1.5\" opacity=\"0.6\"><\u002Fline>\n      <line x1=\"16\" y1=\"9\" x2=\"23\" y2=\"16\" stroke=\"white\" stroke-width=\"1.5\" opacity=\"0.6\"><\u002Fline>\n      <line x1=\"9\" y1=\"16\" x2=\"23\" y2=\"16\" stroke=\"white\" stroke-width=\"1.5\" opacity=\"0.4\"><\u002Fline>\n    <\u002Fsvg>\n    <span class=\"nav-wordmark\"><span class=\"mcp\">MCP<\u002Fspan><span class=\"ster\">STER<\u002Fspan><\u002Fspan>\n  <\u002Fa>\n\n  <ul class=\"footer-links\">\n    <li><a href=\"https://github.com/ruco-ai/MCPSTER\" target=\"_blank\">GitHub<\u002Fa><\u002Fli>\n    <li><a href=\"https://github.com/ruco-ai/MCPSTER/blob/master/README.md\" target=\"_blank\">Docs<\u002Fa><\u002Fli>\n    <li><a href=\"https://github.com/ruco-ai/MCPSTER/issues\" target=\"_blank\">Issues<\u002Fa><\u002Fli>\n    <li><a href=\"https://github.com/ruco-ai/MCPSTER/blob/master/LICENSE\" target=\"_blank\">MIT<\u002Fa><\u002Fli>\n  <\u002Ful>\n\n  <div class=\"footer-right\">© 2026 ruco-ai · MIT License<\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Tweaks panel -->\n<div id=\"tweaks-panel\">\n  <div class=\"tweaks-title\">Tweaks<\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Accent color<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-btn active\" onclick=\"setAccent('283','violet')\">Violet<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setAccent('220','blue')\">Blue<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setAccent('158','green')\">Green<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setAccent('62','amber')\">Amber<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Hero layout<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-btn active\" onclick=\"setHeroGrid(false)\">Centered<\u002Fbutton>\n      <button class=\"tweak-btn\" onclick=\"setHeroGrid(true)\">Split<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Grid opacity<\u002Fdiv>\n    <input class=\"tweak-slider\" type=\"range\" min=\"0\" max=\"80\" value=\"40\" step=\"5\" oninput=\"document.querySelector('.hero').style.setProperty('--grid-opacity', this.value/100)\">\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Tab switching\n  function switchTab(btn, id) {\n    document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));\n    btn.classList.add('active');\n    ['stdio','http','oauth'].forEach(t => {\n      document.getElementById('tab-'+t).style.display = t === id ? '' : 'none';\n    });\n  }\n\n  // Tweaks\n  function setAccent(hue, name) {\n    document.documentElement.style.setProperty('--violet', `oklch(0.65 0.24 ${hue})`);\n    document.documentElement.style.setProperty('--violet-dim', `oklch(0.55 0.20 ${hue})`);\n    document.documentElement.style.setProperty('--violet-glow', `oklch(0.65 0.24 ${hue} / 0.15)`);\n    document.documentElement.style.setProperty('--violet-bg', `oklch(0.65 0.24 ${hue} / 0.08)`);\n    document.querySelectorAll('.tweak-btn').forEach(b => {\n      if (b.textContent.toLowerCase() === name) b.classList.add('active');\n      else if (['Violet','Blue','Green','Amber'].includes(b.textContent)) b.classList.remove('active');\n    });\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentHue: parseInt(hue)}}, '*');\n  }\n\n  function setHeroGrid(split) {\n    const hero = document.querySelector('.hero');\n    if (split) {\n      hero.style.textAlign = 'left';\n      hero.style.alignItems = 'flex-start';\n    } else {\n      hero.style.textAlign = 'center';\n      hero.style.alignItems = 'center';\n    }\n    document.querySelectorAll('.tweak-btn').forEach(b => {\n      if (['Centered','Split'].includes(b.textContent)) b.classList.remove('active');\n    });\n    event.target.classList.add('active');\n  }\n\n  // Tweaks toggle from host\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('visible');\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');\n  });\n  window.parent.postMessage({type: '__edit_mode_available'}, '*');\n\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\"accentHue\": 283}/*EDITMODE-END*/;\n  if (TWEAK_DEFAULTS.accentHue !== 283) setAccent(String(TWEAK_DEFAULTS.accentHue), '');\n<\u002Fscript>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
